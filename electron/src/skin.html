<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>G-Mini Avatar</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            user-select: none;
            -webkit-app-region: no-drag;
        }
        #skin-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        #skin-controls {
            position: fixed;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 6px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
            z-index: 10;
        }
        #skin-controls.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .skin-btn {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(15, 15, 25, 0.55);
            color: #e0e0ff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(6px);
        }
        .skin-btn:hover {
            background: rgba(100, 100, 255, 0.35);
        }
        .skin-btn.skin-mic-active {
            background: rgba(239, 68, 68, 0.55);
            border-color: rgba(255, 255, 255, 0.4);
        }
        .skin-btn.skin-mic-hidden {
            display: none;
        }

        /* ── Mini-chat burbuja (Fase 5) ───────────────────────────── */
        #skin-chat {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 300px;
            display: none;
            flex-direction: column;
            background: rgba(15, 15, 25, 0.72);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255, 255, 255, 0.12);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e8e8ff;
            z-index: 20;
        }
        #skin-chat.visible {
            display: flex;
        }
        #skin-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .skin-chat-msg {
            font-size: 13px;
            line-height: 1.4;
            padding: 6px 10px;
            border-radius: 10px;
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 90%;
        }
        .skin-chat-msg-user {
            align-self: flex-end;
            background: rgba(100, 100, 255, 0.35);
        }
        .skin-chat-msg-agent {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.08);
        }
        .skin-chat-msg-system {
            align-self: center;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            text-align: center;
        }
        #skin-chat-form {
            display: flex;
            gap: 6px;
            padding: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        #skin-chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #e8e8ff;
            padding: 6px 10px;
            font-size: 13px;
            outline: none;
        }
        #skin-chat-form button {
            border: none;
            border-radius: 8px;
            padding: 0 12px;
            background: rgba(100, 100, 255, 0.45);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        #skin-chat-form button:hover {
            background: rgba(100, 100, 255, 0.7);
        }
    </style>
</head>
<body>
    <canvas id="skin-canvas"></canvas>
    <div id="skin-controls">
        <button id="btn-skin-mic" class="skin-btn skin-mic-hidden" title="Activar voz en tiempo real">&#127908;</button>
        <button id="btn-skin-minimize" class="skin-btn" title="Minimizar">&#8211;</button>
        <button id="btn-skin-close" class="skin-btn" title="Cerrar avatar">&#10005;</button>
    </div>
    <div id="skin-chat">
        <div id="skin-chat-messages"></div>
        <form id="skin-chat-form">
            <input id="skin-chat-input" type="text" placeholder="Escribe un mensaje..." autocomplete="off" />
            <button type="submit" title="Enviar">&#10148;</button>
        </form>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "./vendor/three/three.module.js",
            "three/addons/": "./vendor/three/jsm/",
            "@pixiv/three-vrm": "./vendor/three-vrm/three-vrm.module.js"
        }
    }
    </script>
    <script type="module" src="./js/skins/skinRuntime.js"></script>
</body>
</html>
